# nginx proxy address - http://172.17.0.1:3006

name: hoarder
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  app:
    image: ghcr.io/karakeep-app/karakeep:latest
    pull_policy: always
    container_name: hoarder-app
    restart: always
    logging: *default-logging
    networks:
      - hoarder
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:3006:3000"
    environment:
      TZ: ${TZ:-America/New_York}
      NEXTAUTH_SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      NEXTAUTH_URL: http://${BASE_HOST_NAME:-$HOSTNAME}:3006
      MEILI_ADDR: http://hoarder-meilisearch:7700
      MEILI_MASTER_KEY: ${APP_SECRET_KEY:-changeme_meili_master_key_min_16_chars}
      BROWSER_WEB_URL: http://hoarder-chrome:9222
      DATA_DIR: /data
      CONTAINER_NAME: hoarder-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    volumes:
      - ./volumes/data/hoarder:/data
    depends_on:
      - hoarder-meilisearch
      - hoarder-chrome
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://hoarder-app:3000'
      - 'cloudflare.hostname=hoarder.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.hoarder-app.entrypoints=http'
      - 'traefik.http.routers.hoarder-app-secure.tls=true'
      - 'traefik.http.routers.hoarder-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.hoarder-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.hoarder-app.middlewares=hoarder-app-https-redirect'
      - 'traefik.http.routers.hoarder-app-secure.entrypoints=https'
      - 'traefik.http.routers.hoarder-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.hoarder-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.hoarder-app-secure.service=hoarder-app'
      - 'traefik.http.services.hoarder-app.loadbalancer.server.port=3000'

  hoarder-chrome:
    image: gcr.io/zenika-hub/alpine-chrome:latest
    pull_policy: always
    container_name: hoarder-chrome
    restart: always
    logging: *default-logging
    networks:
      - hoarder
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    environment:
      CONTAINER_NAME: hoarder-chrome

  hoarder-meilisearch:
    image: getmeili/meilisearch:latest
    pull_policy: always
    container_name: hoarder-meilisearch
    restart: always
    logging: *default-logging
    networks:
      - hoarder
    environment:
      TZ: ${TZ:-America/New_York}
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${APP_SECRET_KEY:-changeme_meili_master_key_min_16_chars}
      CONTAINER_NAME: hoarder-meilisearch
    volumes:
      - ./volumes/data/meilisearch/hoarder:/meili_data

networks:
  hoarder:
    name: hoarder
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
